<script>
 $.ajaxSetup({
   type: 'POST'
 });
 function matricular(id){
     $.ajax({
         method : "POST",
         url: "\matricular_aluno",
         data: {

         select : $('#select-8dab').val(),
         nome : $('#nome').val(),
         matricula : $('#matricula').val(),
         serie : $('#serie').val(),
         sangue : $('#sangue').val(),
         turma : $('#turma').val(),
         data: $('#data').val(),
         mao : $('#select-ab6a').val(),
         idt: id
         },
         success: function( retorno ) {
              $( "#aluno" ).html();
              alert("Alterado com sucesso")
     }
     })
 }
function especificar(id) {
     $.ajax({
         method : "POST",
         url: "\matricular_aluno",
         data: {idt: (id)},
         success: function( retorno ) {
              $( "#aluno" ).html( retorno );
     }
     })
 }
 function exec(){
   $.ajax({
     method : "POST",
     url: "\matricular_aluno",

     },
     success: function( retorno ) {
       $( "#aluno" ).html(retorno);

   });
 }
</script>
